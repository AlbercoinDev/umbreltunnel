version: "3.8"

services:
  wireguard:
    image: linuxserver/wireguard:latest
    container_name: umbreltunnel-wg
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
      - SERVERURL=${VPS_DOMAIN}
      - SERVERPORT=51820
      - PEERS=20
      - PEERDNS=1.1.1.1
      - INTERNAL_SUBNET=10.10.10.0/24
      - ALLOWEDIPS=0.0.0.0/0
    volumes:
      - wg_data:/config
      - /lib/modules:/lib/modules:ro
    ports:
      - "51820:51820/udp"
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1

  api:
    build: .
    container_name: umbreltunnel-api
    restart: unless-stopped
    ports:
      - "8081:8081"
    cap_add:
      - NET_ADMIN
    volumes:
      - api_data:/data
      - wg_data:/config
      - /lib/modules:/lib/modules:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      LISTEN_ADDR: ":8081"
      DOMAIN: ${VPS_DOMAIN}
      WG_SUBNET: "10.10.10.0/24"
      CADDY_ADMIN: "http://caddy:2019"
      DATA_DIR: "/data"
      API_KEY: ${API_KEY:-}
    depends_on:
      - caddy
      - wireguard

  caddy:
    image: caddy:2-alpine
    container_name: umbreltunnel-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    environment:
      - DOMAIN=${VPS_DOMAIN}
    cap_add:
      - NET_ADMIN
      - NET_RAW

volumes:
  wg_data:
  api_data:
  caddy_data:
  caddy_config:
